<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料結構測驗 - 時間複雜度</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],    
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'noscript',
                processHtmlClass: 'tex2jax_process',
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'code', 'annotation', 'annotation-xml']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #526fff;       
            --bg-color: #eef2ff;            
            --text-main: #1e293b;           
            --border-color: #e2e8f0;
            --transition: all 0.2s ease-in-out;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background-color: #ffffff;     
            padding: 40px 50px;            
            border-radius: 16px;           
            box-shadow: 0 10px 30px rgba(82, 111, 255, 0.08); 
            box-sizing: border-box;
            position: relative; 
        }

        .timer-box {
            position: sticky;      
            top: 20px;             
            float: right;          
            margin-bottom: -50px;  
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 12px rgba(82, 111, 255, 0.15);
            border: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-color);
            z-index: 1000;         
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            color: var(--text-main);
            margin-top: 10px;
            margin-bottom: 50px;
            font-weight: 700;
            clear: both; 
        }

        .question-block { 
            margin-bottom: 45px; 
            padding-bottom: 25px;
            border-bottom: 1px dashed var(--border-color);
            clear: both; 
        }

        .question-number {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .question-content-box {
            display: block;
            background-color: #f8fafc;     
            padding: 24px;
            border-radius: 12px;
            border-left: 5px solid var(--primary-color);
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .monospace-text-div {
            font-family: "Fira Code", Consolas, Monaco, "Courier New", monospace; 
            white-space: pre-wrap;
            font-size: 1rem;
            color: #2d3748;
            line-height: 1.6;
            margin: 0;
        }

        .choice-label { 
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
            color: #334155;
        }

        .choice-label:hover {
            background-color: #f1f5f9;
        }

        .choice-input {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            margin-right: 14px;
            outline: none;
            display: grid;
            place-content: center;
            transition: var(--transition);
            background-color: #fff;
            flex-shrink: 0;
        }

        .choice-input::before {
            content: "";
            width: 11px;
            height: 11px;
            border-radius: 50%;
            transform: scale(0);
            transition: 0.15s transform ease-in-out;
            background-color: #fff;
        }

        .choice-input:checked {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
        }

        .choice-input:checked::before {
            transform: scale(1);
        }

        .choice-label:has(.choice-input:checked) {
            background-color: #eef2ff;
            color: var(--primary-color);
            font-weight: 500;
        }

        .submit-btn { 
            display: block; 
            width: 220px;
            margin: 50px auto 10px; 
            padding: 14px 28px; 
            font-size: 16px; 
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            cursor: pointer; 
            transition: var(--transition);
            text-align: center;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
        }
    </style>
</head>
<body class="tex2jax_process">

    <div class="container">
        <div class="timer-box" id="timerBox">
            ⏱️ <span id="countdown">00:00</span>
        </div>

        <h1>期末專案-時間複雜度題目</h1>
        
        <form action="{% url 'calculate_score' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="user_duration" id="userDuration" value="0">
            
            {% for q in questions %}
            <div class="question-block">
                <div class="question-number">{{ forloop.counter }}.</div>
                
                <div class="question-content-box">
                    <div class="monospace-text-div">{{ q.content|safe }}</div>
                </div>
                
                {% for choice in q.random_choices %}
                <label class="choice-label">
                    <input type="radio" name="q{{ q.id }}" value="{{ choice.id }}" class="choice-input">
                    <span>
                        <strong style="margin-right: 5px;">
                            {% if forloop.counter == 1 %}(A)
                            {% elif forloop.counter == 2 %}(B)
                            {% elif forloop.counter == 3 %}(C)
                            {% elif forloop.counter == 4 %}(D)
                            {% elif forloop.counter == 5 %}(E)
                            {% endif %}
                        </strong>
                        {{ choice.text|slice:"4:"|safe }}
                    </span>
                </label>
                {% endfor %}
            </div>
            {% endfor %}
            
            <button type="submit" class="submit-btn">
                交卷
            </button>
        </form>
    </div>

    <script>
        let totalSeconds = 0;
        const timeDisplay = document.getElementById('countdown');
        const durationInput = document.getElementById('userDuration');

        setInterval(function() {
            totalSeconds++;
            
            durationInput.value = totalSeconds;

            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timeDisplay.textContent = minutes + ':' + seconds;
        }, 1000);
    </script>
</body>
</html>
