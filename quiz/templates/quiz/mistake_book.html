<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的錯題複習本 - 弱點強化</title>
    <style>
        :root {
            --primary-color: #f59e0b;       /* 採用橘色調，代表需要警示與複習 */
            --bg-color: #fffbeb;            
            --text-main: #1e293b;           
            --border-color: #fef3c7;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.1);
            box-sizing: border-box;
        }
        .header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .mistake-card {
            background: #fff;
            border: 1px solid #fed7aa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .mistake-card:hover {
            transform: translateY(-3px);
            border-color: #f59e0b;
        }
        .question-text { 
            font-weight: 700; 
            font-size: 1.1rem;
            margin-bottom: 15px; 
            line-height: 1.6; 
            color: #9a3412; 
        }
        .explanation-box {
            background-color: #fff9db;
            border-left: 5px solid #f59e0b;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #7c2d12;
            line-height: 1.6;
        }
        .no-data {
            text-align: center;
            padding: 50px 0;
        }
        .back-btn {
            display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; color: white;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); border: none; border-radius: 50px; cursor: pointer;
            text-align: center; text-decoration: none; box-sizing: border-box; margin-top: 20px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 style="margin:0 0 10px 0;">📖 我的錯題複習本</h1>
            <p style="color: #64748b; font-size: 0.95rem;">
                系統已自動為您收納了 <strong>{{ wrong_count }}</strong> 題待加強題目
            </p>
        </div>

        {% if mistakes %}
            {% for q in mistakes %}
            <div class="mistake-card">
                <div class="question-text">
                    📌 題目：{{ q.content }}
                </div>
                
                <div class="explanation-box">
                    <strong style="font-size: 1rem;">💡 核心觀念解析：</strong><br>
                    <div style="margin-top: 8px;">
                        {{ q.explanation }}
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="no-data">
                <div style="font-size: 4rem;">🎉</div>
                <h3 style="color: #16a34a;">目前沒有錯題紀錄！</h3>
                <p style="color: #64748b;">代表您在目前的練習中表現完美，繼續保持！</p>
            </div>
        {% endif %}

        <a href="{% url 'index' %}" class="back-btn">返回首頁繼續練習</a>
    </div>

</body>
</html>
